<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kitchen Dashboard — La Maison Rouge</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Josefin+Sans:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="dashboard-body">

  <nav class="dashboard-nav">
    <h1>La Maison Rouge — Kitchen</h1>
    <div style="display:flex;gap:1rem;align-items:center">
      <span class="live-badge">Live Orders</span>
      <a href="/" style="color:#666;font-size:0.75rem;text-decoration:none;letter-spacing:0.1em">← Guest View</a>
    </div>
  </nav>

  <main class="dashboard-main">
    <div class="stats-row" id="statsRow">
      <div class="stat-card"><div class="num" id="statTotal">0</div><div class="lbl">Total Orders</div></div>
      <div class="stat-card"><div class="num" id="statPending">0</div><div class="lbl">Pending</div></div>
      <div class="stat-card"><div class="num" id="statPreparing">0</div><div class="lbl">Preparing</div></div>
      <div class="stat-card"><div class="num" id="statReady">0</div><div class="lbl">Ready</div></div>
      <div class="stat-card"><div class="num" id="statRevenue">₹0</div><div class="lbl">Today's Revenue</div></div>
    </div>

    <div class="orders-grid" id="ordersGrid">
      <div class="no-orders" id="noOrders">
        <p>👨‍🍳 No orders yet.</p>
        <p style="margin-top:0.5rem;font-size:0.75rem">Orders will appear here in real time.</p>
      </div>
    </div>
  </main>

  <script>
    let orders = [];
    const STATUS_CYCLE = ['pending', 'preparing', 'ready'];

    async function fetchOrders() {
      try {
        const res = await fetch('/api/orders');
        orders = await res.json();
        render();
      } catch(e) {}
    }

    async function updateStatus(id, status) {
      try {
        await fetch(`/api/orders/${id}/status`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ status })
        });
        fetchOrders();
      } catch(e) {}
    }

    function nextStatus(current) {
      const i = STATUS_CYCLE.indexOf(current);
      return STATUS_CYCLE[(i + 1) % STATUS_CYCLE.length];
    }

    function render() {
      const grid = document.getElementById('ordersGrid');
      const noOrders = document.getElementById('noOrders');

      if (orders.length === 0) {
        grid.innerHTML = '<div class="no-orders"><p>👨‍🍳 No orders yet.</p><p style="margin-top:0.5rem;font-size:0.75rem">Orders will appear here in real time.</p></div>';
        updateStats([]);
        return;
      }

      grid.innerHTML = [...orders].reverse().map(order => {
        const time = new Date(order.timestamp).toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' });
        const next = nextStatus(order.status);
        const statusLabels = { pending: '🔴 Pending', preparing: '🟠 Preparing', ready: '🟢 Ready' };
        const statusClasses = { pending: 'status-pending', preparing: 'status-preparing', ready: 'status-ready' };
        return `
          <div class="order-card">
            <div class="order-card-header">
              <div>
                <div class="order-table">Table ${order.tableNumber}</div>
                <div class="order-name">${order.guestName}</div>
              </div>
              <div class="order-time">${time}</div>
            </div>
            <div class="order-card-body">
              ${order.items.map(item => `
                <div class="order-item-row">
                  <span>${item.name}</span>
                  <span class="qty">×${item.qty}</span>
                  <span style="color:#555">₹${item.subtotal}</span>
                </div>
              `).join('')}
              ${order.note ? `<div class="order-note">📝 ${order.note}</div>` : ''}
            </div>
            <div class="order-card-footer">
              <div>
                <div class="order-total-label">Total</div>
                <div class="order-total-val">₹${order.total}</div>
              </div>
              <button 
                class="order-status ${statusClasses[order.status]}"
                onclick="updateStatus('${order.id}', '${next}')"
                title="Click to advance status"
              >${statusLabels[order.status]}</button>
            </div>
          </div>
        `;
      }).join('');

      updateStats(orders);
    }

    function updateStats(orders) {
      document.getElementById('statTotal').textContent = orders.length;
      document.getElementById('statPending').textContent = orders.filter(o => o.status === 'pending').length;
      document.getElementById('statPreparing').textContent = orders.filter(o => o.status === 'preparing').length;
      document.getElementById('statReady').textContent = orders.filter(o => o.status === 'ready').length;
      const rev = orders.reduce((s, o) => s + o.total, 0);
      document.getElementById('statRevenue').textContent = `₹${rev.toLocaleString('en-IN')}`;
    }

    fetchOrders();
    setInterval(fetchOrders, 3000); // Poll every 3 seconds
  </script>
</body>
</html>
